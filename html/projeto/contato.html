<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Contato</title>
</head>
<body>

    <h2>Formulário de Contato</h2>

    <form>

        <label for="nome">Nome:</label><br>
        <input type="text" id="nome" name="nome" required><br><br>

        <label for="email">E-mail:</label><br>
        <input type="email" id="email" name="email" required><br><br>

        <label for="telefone">Telefone:</label><br>
        <input type="tel" id="telefone" name="telefone"><br><br>

        <label for="assunto">Assunto:</label><br>
        <input type="text" id="assunto" name="assunto"><br><br>

        <label for="mensagem">Mensagem:</label><br>
        <textarea id="mensagem" name="mensagem" rows="4" required></textarea><br><br>
        <label>Interesses:</label><br>
<input type="checkbox" id="ser1">
<label for="ser1">serviço 1</label>
<input type="checkbox" id="ser2">
<label for="ser2">serviço 2</label>
<input type="checkbox" id="ser3">
<label for="ser3">serviço 3</label><br><br>

        <input type="checkbox" id="termos" name="termos" required>
        <label for="termos">Aceito os termos</label><br><br>

        <button type="submit">Enviar</button>

    </form>


</body>
</html>
