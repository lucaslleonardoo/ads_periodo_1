<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Contato</title>
   <link rel="stylesheet" href="style.css"> 
    
</head>
<body>

    <header>
        <h1>Meu Site</h1>
    </header>

    <main>
        <section>

            <h2>Formulário de Contato</h2>

            <form action="#" method="post">

                <label for="nome">Nome:</label><br>
                <input type="text" id="nome" name="nome" required><br><br>

                <label for="email">E-mail:</label><br>
                <input type="email" id="email" name="email" required><br><br>

                <label for="telefone">Telefone:</label><br>
                <input type="tel" id="telefone" name="telefone"><br><br>

                <label for="assunto">Assunto:</label><br>
                <input type="text" id="assunto" name="assunto"><br><br>

                <label for="mensagem">Mensagem:</label><br>
                <textarea id="mensagem" name="mensagem" rows="4" required></textarea><br><br>

                <fieldset>
                    <legend>Interesses:</legend>

                    <input type="checkbox" id="ser1" name="interesses" value="servico1">
                    <label for="ser1">Serviço 1</label><br>

                    <input type="checkbox" id="ser2" name="interesses" value="servico2">
                    <label for="ser2">Serviço 2</label><br>

                    <input type="checkbox" id="ser3" name="interesses" value="servico3">
                    <label for="ser3">Serviço 3</label>
                </fieldset>

                <br>

                <input type="checkbox" id="termos" name="termos" required>
                <label for="termos">Aceito os termos</label><br><br>

                <button type="submit">Enviar</button>

            </form>

        </section>
    </main>

    <footer>
        <p>© 2026</p>
    </footer>

</body>
</html>
